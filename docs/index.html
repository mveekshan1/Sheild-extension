<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIELD Web Demo</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <span class="icon">🛡️</span>
        <div>
          <h1>SHIELD Web Demo</h1>
          <p class="subtitle">Analyze a URL and inspect the backend risk report.</p>
        </div>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-header">
          <h2>Enter a website URL</h2>
          <p>Get a risk score, structured issue list, and AI explanation from the backend.</p>
        </div>

        <form id="analyze-form" class="input-panel">
          <label class="sr-only" for="urlInput">Website URL</label>
          <input id="urlInput" type="text" placeholder="Enter a website URL (e.g., https://example.com)" autocomplete="off" />
          <button id="analyzeBtn" type="submit" class="action-btn">Analyze URL</button>
        </form>

        <div id="messageBox" class="message-box" aria-live="polite"></div>
        <div id="loading" class="loading hidden">Analyzing URL, please wait…</div>
      </section>

      <section id="resultContainer" class="results-section hidden">
        <div class="result-card">
          <div class="result-header">
            <h3>Risk score</h3>
          </div>
          <div id="riskScore" class="risk-score">—</div>
        </div>

        <div class="result-card">
          <div class="result-header">
            <h3>Issues</h3>
          </div>
          <ul id="issuesList" class="issues-list"></ul>
        </div>

        <div class="result-card">
          <div class="result-header">
            <h3>AI explanation</h3>
          </div>
          <p id="explanation" class="explanation-text"></p>
        </div>
      </section>
    </main>

    <footer>
      <p>Powered by Google Gemini API | <a href="https://github.com/mveekshan1/Sheild-extension" target="_blank" rel="noreferrer">View on GitHub</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
